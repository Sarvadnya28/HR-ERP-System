{% include 'header.html' %}

<div class="premium-form-container">
	<div style="text-align: center; margin-bottom: 2.5rem;">
		<div class="logo-icon" style="margin: 0 auto 1.5rem; width: 60px; height: 60px; font-size: 1.5rem;">🔑</div>
		<h2 style="font-size: 1.8rem; margin-bottom: 8px;">Admin Intelligence</h2>
		<p style="color: var(--text-dim); font-size: 0.9rem;">Sign in to access the enterprise control center</p>
	</div>

	<form action="/admindashboard" method="post" class="form-grid">
		<div class="form-group">
			<label class="form-label">Username</label>
			<input class="glass-input" type="text" name="txtUsername" placeholder="Enter administrative ID" required
				autocomplete="username">
		</div>

		<div class="form-group">
			<label class="form-label">Password</label>
			<input class="glass-input" type="password" name="txtPassword" placeholder="Enter secure key" required
				autocomplete="current-password">
		</div>

		<div class="checkbox-group">
			<input type="checkbox" id="remember" style="accent-color: var(--p-indigo);">
			<label for="remember">Keep session active</label>
		</div>

		<button type="submit" class="btn-premium">Authenticate & Enter →</button>
	</form>

	<div style="text-align: center; margin-top: 2rem;">
		<a href="/" style="color: var(--text-dim); font-size: 0.85rem; font-weight: 500;">← Back to External Portal</a>
	</div>
</div>

{% include 'footer.html' %}
