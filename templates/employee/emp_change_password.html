{% include 'employee/empheader.html' %}

<section style="padding: 10rem 2rem 5rem; max-width: 1200px; margin: 0 auto;">
    
    <div style="text-align: center; margin-bottom: 4rem;">
        <div style="display:inline-block; padding: 6px 14px; background: rgba(99, 102, 241, 0.1); border: 1px solid var(--border-glass); border-radius: 99px; font-size: 0.7rem; font-weight: 800; color: var(--p-indigo); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.5rem;">
            Security Protocol
        </div>
        <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Identity <span style="color: var(--p-indigo);">Revalidation</span></h2>
        <p style="color: var(--text-dim);">Coordinate your enterprise security credentials</p>
    </div>

    <div class="premium-form-container" style="max-width: 500px; margin-top: 0;">
        <form action="/emp_change_password" method="post" style="display: flex; flex-direction: column; gap: 2rem;">
            <div class="form-group">
                <label class="form-label">Current Intelligence Key (Old Password)</label>
                <input class="glass-input" type="password" name="txtOldPassword" placeholder="••••••••" required>
            </div>
            
            <div style="height: 1px; background: var(--border-glass); margin: 0.5rem 0;"></div>
            
            <div class="form-group">
                <label class="form-label">New Intelligence Key</label>
                <input class="glass-input" type="password" name="txtNewPassword" placeholder="••••••••" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Synchronize Key (Confirm Password)</label>
                <input class="glass-input" type="password" name="txtConfPassword" placeholder="••••••••" required>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 1rem;">
                <button type="submit" class="btn-premium" style="flex: 1;">Update Cipher ✓</button>
                <a href="/emp_home" class="btn-premium btn-secondary" style="flex: 0.5;">Retract</a>
            </div>
        </form>
    </div>

</section>

{% include 'footer.html' %}
