{% include 'header.html' %}

<div class="premium-form-container">
    <div style="text-align: center; margin-bottom: 2.5rem;">
        <div class="logo-icon"
            style="margin: 0 auto 1.5rem; width: 60px; height: 60px; font-size: 1.5rem; background: linear-gradient(135deg, var(--p-cyan), var(--p-indigo));">
            👤</div>
        <h2 style="font-size: 1.8rem; margin-bottom: 8px;">Personnel Access</h2>
        <p style="color: var(--text-dim); font-size: 0.9rem;">Sign in with your corporate credentials</p>
    </div>

    <form action="/emp_dashboard" method="post" class="form-grid">
        <div class="form-group">
            <label class="form-label">Employee ID</label>
            <input class="glass-input" type="text" name="txtEmpId" placeholder="e.g. LITS-001" required>
        </div>

        <div class="form-group">
            <label class="form-label">Secure Password</label>
            <input class="glass-input" type="password" name="txtPassword" placeholder="Enter your password" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="emp_remember" style="accent-color: var(--p-cyan);">
            <label for="emp_remember">Stay signed in on this workstation</label>
        </div>

        <button type="submit" class="btn-premium"
            style="background: linear-gradient(135deg, var(--p-cyan), var(--p-indigo));">Authorize Session →</button>
    </form>

    <div style="text-align: center; margin-top: 2rem;">
        <a href="/" style="color: var(--text-dim); font-size: 0.85rem; font-weight: 500;">← Back to External Portal</a>
    </div>
</div>

{% include 'footer.html' %}
